# =============================================
# CRM Marketing System - Nhom 8
# Application Configuration
# =============================================

# Server
server.port=8082
server.servlet.context-path=/api

# =============================================
# SQL Server Database
# =============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=DoAnPhanMem_Nhom8;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# =============================================
# JWT Configuration
# =============================================
app.jwt.secret=nhom8-crm-secret-key-must-be-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000
app.jwt.otp-expiration-ms=300000

