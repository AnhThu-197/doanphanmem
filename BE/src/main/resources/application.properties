# =============================================
# CRM Marketing System - Nhóm 8
# Application Configuration
# =============================================

# Server
server.port=8080
server.servlet.context-path=/api

# =============================================
# SQL Server Database
# =============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=DoAnPhanMem_Nhom8;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=1234
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
# Khong de Hibernate tu tao/alter bang vi database da duoc tao bang file SQL rieng.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# =============================================
# JWT Configuration
# =============================================
app.jwt.secret=nhom8-crm-secret-key-must-be-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000
# OTP expiration: 5 minutes
app.jwt.otp-expiration-ms=300000

# =============================================
# Mail (SMTP)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@nhom8crm.com
app.mail.from-name=Nhóm 8 CRM

# =============================================
# File Upload
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# =============================================
# CORS
# =============================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# =============================================
# Logging
# =============================================
logging.level.com.nhom8=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# =============================================
# Springdoc / Swagger
# =============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
